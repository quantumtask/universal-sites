<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 68" fill="none" role="img" aria-label="Plumbify Services">

  <!-- ── P mark ── -->
  <!-- Vertical stem -->
  <rect x="4" y="10" width="11" height="48" rx="5.5" fill="#1e3a5f"/>
  <!-- Top crossbar -->
  <rect x="4" y="10" width="34" height="11" rx="5.5" fill="#1e3a5f"/>
  <!-- Mid crossbar -->
  <rect x="4" y="32" width="34" height="11" rx="5.5" fill="#1e3a5f"/>
  <!-- Right curve of P -->
  <rect x="27" y="10" width="11" height="33" rx="5.5" fill="#1e3a5f"/>

  <!-- ── Orange accent: water-drop / emergency flash ── -->
  <!-- Drop body -->
  <ellipse cx="54" cy="44" rx="7" ry="10" fill="#e85d04"/>
  <!-- Drop tip pointing up -->
  <path d="M47.5 40 Q54 24 60.5 40" fill="#e85d04"/>
  <!-- Inner highlight -->
  <ellipse cx="51" cy="42" rx="2.5" ry="3.5" fill="rgba(255,255,255,0.35)" transform="rotate(-20 51 42)"/>

  <!-- ── Wordmark ── -->
  <text
    x="76" y="45"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="27"
    letter-spacing="-0.5"
    fill="#1e3a5f"
  >PLUMBIFY</text>

  <!-- ── Tagline ── -->
  <text
    x="77" y="58"
    font-family="Arial, sans-serif"
    font-weight="400"
    font-size="9"
    letter-spacing="2.5"
    fill="#2563eb"
    text-transform="uppercase"
  >LONDON EMERGENCY</text>

</svg>
