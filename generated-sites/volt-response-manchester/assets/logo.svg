  <text x="50" y="38" font-family="'Segoe UI',Arial,sans-serif" font-weight="600" font-size="10" fill="#1a3a5c" letter-spacing="0.3">EMERGENCY ELECTRICIANS</text>
  <text x="50" y="52" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="7" fill="#f0a500" letter-spacing="1.8">MANCHESTER</text>
