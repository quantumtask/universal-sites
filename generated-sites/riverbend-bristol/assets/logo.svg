  <!-- Wordmark -->
  <text x="58" y="26" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="16" fill="#1f4f7a" letter-spacing="-0.5">RIVERBEND</text>
  <text x="58" y="42" font-family="'Segoe UI',Arial,sans-serif" font-weight="600" font-size="10.5" fill="#278ecf" letter-spacing="0.1">PLUMBING</text>
