<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 72" fill="none" role="img" aria-label="Verdant Landscapes">

  <!-- ── V mark: two leaf halves ─────────────────────────── -->

  <!-- Left arm — dark forest green -->
  <path d="M 6 9 L 21 9 Q 22 9 23 11 L 35 57 L 29 61 Q 12 22 6 9 Z"
        fill="#1a4a2e"/>

  <!-- Right arm — mid green (slightly lighter for depth) -->
  <path d="M 56 9 L 41 9 Q 40 9 39 11 L 27 57 L 33 61 Q 50 22 56 9 Z"
        fill="#2d7a4f"/>

  <!-- ── Earth anchor: warm gold at the base ─────────────── -->
  <rect  x="28" y="58" width="6"  height="10" rx="3"     fill="#d4a853"/>
  <ellipse cx="31" cy="70" rx="11" ry="3.5"              fill="#d4a853" opacity=".28"/>

  <!-- ── Gold seed at the V apex ─────────────────────────── -->
  <circle cx="31" cy="9" r="5.5" fill="#d4a853"/>
  <circle cx="31" cy="9" r="2.5" fill="#fff"   opacity=".55"/>

  <!-- ── Wordmark ─────────────────────────────────────────── -->
  <text
    x="74" y="38"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="700"
    font-size="27"
    letter-spacing="2"
    fill="#1a4a2e"
  >VERDANT</text>

  <text
    x="75" y="55"
    font-family="Arial, sans-serif"
    font-weight="400"
    font-size="10"
    letter-spacing="4.5"
    fill="#2d7a4f"
  >LANDSCAPES</text>

</svg>
