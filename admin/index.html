<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Site Editor</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sb:#0f172a;--sb-hover:rgba(255,255,255,.06);--sb-active:#1d4ed8;
  --bg:#f1f5f9;--card:#fff;--border:#e2e8f0;
  --text:#0f172a;--muted:#64748b;
  --accent:#6366f1;--green:#10b981;--red:#ef4444;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
a{color:inherit;text-decoration:none}

/* Layout */
.layout{display:flex;height:100vh;overflow:hidden}
aside{width:240px;min-width:240px;background:var(--sb);display:flex;flex-direction:column;overflow:hidden}
main{flex:1;overflow-y:auto;display:flex;flex-direction:column}

/* Sidebar */
.sb-top{padding:18px 14px 14px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;flex-direction:column;gap:10px}
.sb-logo{color:#fff;font-size:15px;font-weight:700;letter-spacing:-.02em;display:flex;align-items:center;gap:8px}
.site-list{flex:1;overflow-y:auto;padding:6px}
.site-item{padding:9px 11px;border-radius:8px;cursor:pointer;color:#94a3b8;font-size:13px;font-weight:500;transition:.15s;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:flex;align-items:center;gap:8px;user-select:none}
.site-item:hover{background:var(--sb-hover);color:#fff}
.site-item.active{background:var(--sb-active);color:#fff}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.5;flex-shrink:0}
.site-item.active .dot{opacity:1;background:#93c5fd}
.sb-footer{padding:12px 14px;border-top:1px solid rgba(255,255,255,.07)}
.sb-footer small{color:#475569;font-size:11px}

/* Empty state */
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted);padding:40px;text-align:center}
.empty-icon{font-size:52px}
.empty h2{font-size:20px;color:var(--text)}

/* Editor */
.editor{display:flex;flex-direction:column;min-height:100%}
.ed-header{background:var(--card);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20}
.ed-name{font-size:16px;font-weight:700}
.ed-id{font-size:11px;color:var(--muted);font-family:monospace;margin-top:2px}
.ed-actions{display:flex;gap:8px}

/* Tabs */
.tab-bar{background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;display:flex;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{padding:11px 14px;font-size:13px;font-weight:500;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:.15s;font-family:var(--font)}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}

/* Tab body */
.tab-body{flex:1;padding:24px;max-width:1100px}

/* Cards */
.card{background:var(--card);border-radius:12px;padding:22px;border:1px solid var(--border);margin-bottom:16px}
.card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid.g1{grid-template-columns:1fr}
.grid.g3{grid-template-columns:1fr 1fr 1fr}

/* Form */
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.fg small{font-size:11px;color:#94a3b8}
.fg input,.fg textarea,.fg select{padding:9px 11px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:var(--font);color:var(--text);background:var(--bg);transition:border-color .15s;width:100%}
.fg input:focus,.fg textarea:focus,.fg select:focus{outline:none;border-color:var(--accent);background:#fff}
.fg input[readonly]{color:var(--muted);background:#f8fafc;cursor:default}
.fg textarea{resize:vertical;min-height:72px}

/* Colour picker */
.color-row{display:flex;align-items:center;gap:10px}
.swatch{width:38px;height:38px;border-radius:8px;border:1px solid var(--border);overflow:hidden;flex-shrink:0;cursor:pointer;position:relative}
.swatch input[type=color]{position:absolute;inset:-4px;width:calc(100% + 8px);height:calc(100% + 8px);border:none;padding:0;cursor:pointer;opacity:0}
.swatch-fill{position:absolute;inset:0;border-radius:7px;pointer-events:none}
.color-hex{flex:1;font-family:monospace!important}
.color-hint{font-size:11px;color:#94a3b8;margin-top:3px}

/* Image preview */
.img-prev{width:100%;height:110px;object-fit:cover;border-radius:8px;border:1px solid var(--border);display:block;margin-top:8px}
.img-placeholder{width:100%;height:110px;border:1.5px dashed var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--muted);margin-top:8px}

/* List items */
.li{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px}
.li-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.li-title{font-size:13px;font-weight:600}
.li-body{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.li-body.g1{grid-template-columns:1fr}

/* Buttons */
.btn{padding:8px 15px;border-radius:8px;font-size:13px;font-weight:600;border:none;cursor:pointer;transition:.15s;font-family:var(--font);white-space:nowrap;display:inline-flex;align-items:center;gap:6px}
.btn-new{background:rgba(255,255,255,.1);color:#fff;width:100%;justify-content:center}
.btn-new:hover{background:rgba(255,255,255,.16)}
.btn-save{background:var(--green);color:#fff}
.btn-save:hover{filter:brightness(1.08)}
.btn-gen{background:var(--accent);color:#fff;min-width:130px;justify-content:center}
.btn-gen:hover{filter:brightness(1.08)}
.btn-gen:disabled{opacity:.6;cursor:default;filter:none}
.btn-ghost{background:var(--bg);color:var(--text);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--border)}
.btn-del{background:var(--red);color:#fff;font-size:11px;padding:5px 10px;border-radius:6px}
.btn-add{background:transparent;color:var(--accent);border:1.5px dashed currentColor;width:100%;justify-content:center;padding:9px;border-radius:8px;margin-top:4px}
.btn-add:hover{background:rgba(99,102,241,.06)}

/* Presets */
.presets{display:flex;gap:6px;flex-wrap:wrap;margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}
.preset-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:8px;display:block;width:100%}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
.modal{background:#fff;border-radius:16px;padding:30px;width:420px;max-width:calc(100vw - 32px);box-shadow:0 25px 60px rgba(0,0,0,.2)}
.modal h2{font-size:19px;margin-bottom:18px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

/* Toast */
.toast{position:fixed;bottom:22px;right:22px;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:600;color:#fff;z-index:200;opacity:0;transform:translateY(6px);transition:.2s;pointer-events:none;max-width:300px;box-shadow:0 8px 24px rgba(0,0,0,.18)}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{background:var(--green)}
.toast.err{background:var(--red)}
.toast.info{background:var(--accent)}

code{font-size:12px;background:#f1f5f9;padding:1px 5px;border-radius:4px;font-family:monospace}

/* Upload row */
.img-row{display:flex;gap:8px;align-items:flex-start}
.img-row input{flex:1}
.btn-upload{background:var(--bg);color:var(--muted);border:1px solid var(--border);font-size:18px;padding:6px 10px;border-radius:8px;cursor:pointer;flex-shrink:0;transition:.15s;line-height:1}
.btn-upload:hover{background:var(--border);color:var(--text)}
.upload-hint{font-size:11px;color:#94a3b8;margin-top:3px}

/* Niche picker */
.niche-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-top:4px}
.niche-card{border-radius:10px;padding:14px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:7px;text-align:center;border:2px solid transparent;transition:.15s;position:relative;min-height:88px;justify-content:center;user-select:none}
.niche-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.25)}
.niche-card.selected{border-color:rgba(255,255,255,.9);box-shadow:0 0 0 3px var(--accent),0 6px 20px rgba(0,0,0,.25)}
.niche-icon{font-size:26px;line-height:1}
.niche-name{font-size:10.5px;font-weight:700;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.5);letter-spacing:-.01em;line-height:1.25}
.niche-check{position:absolute;top:6px;right:8px;font-size:13px;color:#fff;opacity:0;transition:.15s}
.niche-card.selected .niche-check{opacity:1}
</style>
</head>
<body>

<div class="layout">

  <!-- Sidebar -->
  <aside>
    <div class="sb-top">
      <div class="sb-logo">⚡ Site Editor</div>
      <button class="btn btn-new" onclick="showModal()">+ New Site</button>
    </div>
    <div class="site-list" id="siteList"></div>
    <div class="sb-footer"><small>Edit JSON → Generate → Deploy</small></div>
  </aside>

  <!-- Main -->
  <main id="main">
    <div class="empty" id="emptyState">
      <div class="empty-icon">📋</div>
      <h2>Select a site to edit</h2>
      <p>Choose from the list on the left, or create a new site.</p>
    </div>

    <div class="editor" id="editor" style="display:none">
      <div class="ed-header">
        <div>
          <div class="ed-name" id="edName"></div>
          <div class="ed-id" id="edId"></div>
        </div>
        <div class="ed-actions">
          <button class="btn btn-save" onclick="save()">💾 Save</button>
          <button class="btn btn-gen" id="genBtn" onclick="generate()">⚡ Generate Site</button>
          <button class="btn btn-ghost" id="dlBtn" onclick="downloadSite()" title="Download generated HTML">⬇ Download</button>
        </div>
      </div>
      <div class="tab-bar" id="tabBar"></div>
      <div class="tab-body" id="tabBody"></div>
    </div>
  </main>
</div>

<!-- New Site Modal -->
<div class="overlay" id="modal" style="display:none" onclick="if(event.target===this)hideModal()">
  <div class="modal">
    <h2>Create New Site</h2>
    <div class="fg">
      <label>Site ID</label>
      <input id="newId" type="text" placeholder="e.g. rapid-clean-glasgow"
             oninput="this.value=this.value.toLowerCase().replace(/[^a-z0-9-]/g,'-')"
             onkeydown="if(event.key==='Enter')createSite();if(event.key==='Escape')hideModal()">
      <small>Lowercase letters, numbers and hyphens only — this becomes the folder name</small>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="hideModal()">Cancel</button>
      <button class="btn btn-save" onclick="createSite()">Create Site</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

  try { return path.split('.').reduce((o,k)=>o?.[k], data) ?? ''; } catch { return ''; }
}
function sp(path, val) {
  const keys = path.split('.'), last = keys.pop();
  const t = keys.reduce((o,k)=>{ if(o[k]==null)o[k]={}; return o[k]; }, data);
  t[last] = val;
}
function esc(s) {
  return String(s??'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── Toast ─────────────────────────────────────────── */
let _tt;
function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast ${type} show`;
  clearTimeout(_tt); _tt = setTimeout(()=>el.classList.remove('show'), 3000);
}

/* ── Load sites list ───────────────────────────────── */
async function init() {
  const r = await fetch('/api/sites');
  sites = await r.json();
  renderList();
  if (sites.length) loadSite(sites[0]);
}

function renderList() {
  document.getElementById('siteList').innerHTML = sites.map(id =>
    `<div class="site-item ${id===currentId?'active':''}" onclick="loadSite('${id}')">
       <div class="dot"></div>${esc(id)}
     </div>`
  ).join('');
}

/* ── Load a site ───────────────────────────────────── */
async function loadSite(id) {
  const r = await fetch(`/api/sites/${id}`);
  if (!r.ok) { toast('Failed to load','err'); return; }
  data = await r.json();
  currentId = id;
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('editor').style.display = 'flex';
  document.getElementById('edName').textContent = data.business_name || id;
  document.getElementById('edId').textContent   = id;
  renderList();
  renderTabBar();
  renderTab(activeTab);
}

/* ── Tabs ──────────────────────────────────────────── */
function renderTabBar() {
  document.getElementById('tabBar').innerHTML = TABS.map(t =>
    `<button class="tab-btn ${t.id===activeTab?'active':''}" onclick="renderTab('${t.id}')">${t.label}</button>`
  ).join('');
}

function renderTab(tab) {
  activeTab = tab;
  renderTabBar();
  const fn = {
    identity:  tabIdentity,
    content:   tabContent,
    theme:     tabTheme,
    images:    tabImages,
    services:  tabServices,
    reviews:   tabReviews,
    faqs:      tabFaqs,
    standards: tabStandards,
    ctas:      tabCtas,
    pricing:   tabPricing,
    gallery:   tabGallery,
    meta:      tabMeta,
  };
  document.getElementById('tabBody').innerHTML = (fn[tab] || (()=>''))();
  document.querySelectorAll('.img-url').forEach(updatePreview);
}

/* ── Field helpers ─────────────────────────────────── */
function tf(label, path, ph='', type='text', ro=false) {
  const v = esc(gp(path));
  return `<div class="fg"><label>${label}</label>
    <input type="${type}" value="${v}" placeholder="${esc(ph)}" ${ro?'readonly':''}
           oninput="sp('${path}',this.value)${path==='business_name'?';document.getElementById(\'edName\').textContent=this.value||currentId':''}"
    ></div>`;
}
function ta(label, path, ph='', rows=3) {
  const v = esc(gp(path));
  return `<div class="fg"><label>${label}</label>
    <textarea rows="${rows}" placeholder="${esc(ph)}" oninput="sp('${path}',this.value)">${v}</textarea></div>`;
}

  return `

function pickColor(k, v) {
  sp(`theme_colors.${k}`, v);
  const el = document.getElementById(`ch-${k}`); if(el) el.value = v;
  const sf = document.getElementById(`sf-${k}`); if(sf) sf.style.background = v;
}
function hexColor(k, v) {
  if (/^#[0-9a-fA-F]{6}$/.test(v)) {
    sp(`theme_colors.${k}`, v);
    const sf = document.getElementById(`sf-${k}`); if(sf) sf.style.background = v;
  }
}
function applyPreset(p) {
  data.theme_colors = {primary:p.p,secondary:p.s,accent:p.a,background:p.bg,text:p.t,surface:p.su};
  renderTab('theme');

            <button class="btn-upload" title="Upload from your computer"
                    onclick="document.getElementById('${uid}').click()">📁</button>

                   onchange="handleUpload(this)">
          </div>

          <div id="pv-${img.k}">

                : `<div class="img-placeholder">No image yet</div>`}
          </div>
        </div>`;
      }).join('')}
    </div>

function toPreviewSrc(v) {
  if (!v) return '';
  // Convert stored relative paths (assets/...) to admin-accessible URL
  if (v.startsWith('assets/')) return `/site-assets/${currentId}/${v}`;
  return v;
}
function updatePreview(input) {
  const c = document.getElementById(input.dataset.prev);
  if (!c) return;
  const v = input.value.trim();
  c.innerHTML = v
    ? `<img class="img-prev" src="${esc(toPreviewSrc(v))}" onerror="this.style.display='none'">`
    : `<div class="img-placeholder">No image — paste a URL above</div>`;
}

function add(type, tmpl) {
  if (!data[type]) data[type] = [];
  data[type].push({...tmpl});
  renderTab(activeTab);
}
/* ── TAB: Gallery ──────────────────────────────────── */
function tabGallery() {
  const arr = data.gallery || [];
  return `
  <div class="card">
    <div class="card-title">Photo Gallery (${arr.length})</div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:14px">
      Optional — leave empty to hide the gallery section entirely.
      Paste image URLs <strong>or</strong> click 📁 to upload from your computer.
    </p>
    ${arr.map((item,i) => {
      const uid = `gal-file-${i}`;
      return `
      <div class="li">
        <div class="li-head">
          <span class="li-title">Photo ${i+1}${item.caption?' — '+esc(item.caption):''}</span>
          <button class="btn btn-del" onclick="del('gallery',${i})">Remove</button>
        </div>
        <div class="li-body g1">
          <div class="fg">
            <label>Image</label>
            <div class="img-row">
              <input type="text" class="img-url" data-prev="gpv-${i}" value="${esc(item.img||'')}"
                     placeholder="https://… or click 📁 to upload"
                     oninput="data.gallery[${i}].img=this.value;updatePreview(this)">
              <button class="btn-upload" title="Upload from your computer"
                      onclick="document.getElementById('${uid}').click()">📁</button>
              <input type="file" id="${uid}" accept="image/*" style="display:none"
                     data-path="gallery.${i}.img" data-prev="gpv-${i}"
                     onchange="handleUpload(this)">
            </div>
            <div id="gpv-${i}">
              ${item.img
                ? `<img class="img-prev" src="${esc(toPreviewSrc(item.img))}" onerror="this.style.display='none'">`
                : `<div class="img-placeholder">No image yet</div>`}
            </div>
          </div>
          <div class="grid">
            <div class="fg"><label>Caption</label>
              <input value="${esc(item.caption||'')}" placeholder="Brief caption shown below the photo"
                     oninput="data.gallery[${i}].caption=this.value;this.closest('.li').querySelector('.li-title').textContent='Photo ${i+1}'+( this.value?' — '+this.value:'')">
            </div>
            <div class="fg"><label>Alt Text (optional)</label>
              <input value="${esc(item.alt||'')}" placeholder="Accessibility description"
                     oninput="data.gallery[${i}].alt=this.value">
            </div>
          </div>
        </div>
      </div>`}).join('')}
    <button class="btn btn-add" onclick="add('gallery',{img:'',caption:'',alt:''})">+ Add Photo</button>
  </div>`;
}

/* ── Upload helpers ────────────────────────────────── */
function handleUpload(fileInput) {
  const file = fileInput.files[0];
  if (!file) return;
  if (file.size > 12 * 1024 * 1024) { toast('File too large — max 12 MB','err'); return; }
  toast('Uploading…','info');
  const reader = new FileReader();
  reader.onload = async (e) => {
    const fname = Date.now() + '-' + file.name.replace(/[^a-z0-9._-]/gi,'-').toLowerCase();
    const r = await fetch(`/api/upload/${currentId}`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ filename: fname, data: e.target.result }),
    });
    const j = await r.json();
    if (!j.url) { toast('Upload failed','err'); return; }
    sp(fileInput.dataset.path, j.url);
    // Update the URL text input in the same img-row
    const row = fileInput.closest('.img-row') || fileInput.parentElement;
    const textInput = row ? row.querySelector('input[type="text"]') : null;
    if (textInput) { textInput.value = j.url; }
    // Update preview (use server-provided preview URL so browser can load the uploaded file)
    const prev = document.getElementById(fileInput.dataset.prev);
    if (prev) prev.innerHTML = `<img class="img-prev" src="${j.preview || j.url}">`;
    toast('Uploaded ✓');
  };
  reader.readAsDataURL(file);
}

function addStr(type) {
  if (!data[type]) data[type] = [];
  data[type].push('');
  renderTab(activeTab);
}
function del(type, i) {
  data[type].splice(i, 1);
  renderTab(activeTab);
}

/* ── Save ──────────────────────────────────────────── */
async function save() {
  if (!currentId) return;
  const r = await fetch(`/api/sites/${currentId}`, {
    method:'PUT', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(data),
  });
  if (r.ok) { toast('Saved ✓'); renderList(); }
  else toast('Save failed','err');
}

/* ── Generate ──────────────────────────────────────── */
async function generate() {
  if (!currentId) return;
  const btn = document.getElementById('genBtn');
  btn.disabled = true; btn.textContent = '⏳ Generating…';
  toast('Saving and generating…','info');
  try {
    await fetch(`/api/sites/${currentId}`, {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(data),
    });
    const r = await fetch(`/api/generate/${currentId}`, {method:'POST'});
    const j = await r.json();
    if (r.ok) {
      toast('Site generated ✓ — downloading now…');
      btn.textContent = '✓ Done';
      triggerDownload(currentId);
      setTimeout(()=>{ btn.disabled=false; btn.textContent='⚡ Generate Site'; }, 3000);
    } else {
      toast('Generation failed: ' + j.error, 'err');
      btn.disabled=false; btn.textContent='⚡ Generate Site';
    }
  } catch {
    toast('Network error','err');
    btn.disabled=false; btn.textContent='⚡ Generate Site';
  }
}

function triggerDownload(id) {
  window.location.href = `/api/download/${id}`;
}

async function downloadSite() {
  if (!currentId) return;
  const r = await fetch(`/api/download/${currentId}`);
  if (r.status === 404) {
    toast('Generate the site first, then download.', 'err');
    return;
  }
  triggerDownload(currentId);
}

/* ── New site modal ────────────────────────────────── */
function showModal() { document.getElementById('modal').style.display='flex'; document.getElementById('newId').focus(); }
function hideModal() { document.getElementById('modal').style.display='none'; }
async function createSite() {
  const id = document.getElementById('newId').value.trim();
  if (!id) { toast('Enter a site ID','err'); return; }
  const r = await fetch('/api/sites', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({id}),
  });
  const j = await r.json();
  if (r.ok) {
    hideModal();
    sites = [...sites, id].sort();
    renderList();
    await loadSite(id);
    toast(`"${id}" created — fill in the details and hit Generate`);
  } else toast(j.error||'Failed','err');
}

/* ── Keyboard shortcut Ctrl+S ──────────────────────── */
document.addEventListener('keydown', e => {
  if ((e.ctrlKey||e.metaKey) && e.key==='s') { e.preventDefault(); save(); }
});

init();
</script>
